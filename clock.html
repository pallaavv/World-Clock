<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Clock — Delhi & Beyond</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --card: #1a2236;
      --accent: #f59e0b;
      --accent2: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: #1e2d45;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(239,68,68,0.05) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 2.5rem 1rem 0.5rem;
      position: relative;
    }
    header .tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }
    header h1 span { color: var(--accent); }

    /* ── MAIN CLOCK (IST / Delhi) ── */
    .main-clock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1rem;
    }

    .city-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .main-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(3.5rem, 14vw, 8rem);
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1;
      text-shadow: 0 0 40px rgba(245,158,11,0.25);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 30px rgba(245,158,11,0.2); }
      50%       { text-shadow: 0 0 60px rgba(245,158,11,0.5); }
    }

    .main-date {
      margin-top: 0.6rem;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* analog clock */
    .analog-wrap {
      margin: 1.8rem 0 0.5rem;
    }
    .clock-face {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--card);
      position: relative;
      box-shadow: 0 0 0 6px var(--surface), 0 0 30px rgba(245,158,11,0.15);
    }
    .clock-face::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(245,158,11,0.12);
    }
    /* tick marks */
    .tick {
      position: absolute;
      width: 2px;
      background: var(--muted);
      left: 50%;
      transform-origin: bottom center;
      bottom: 50%;
    }
    .tick.major { height: 10px; background: var(--accent); opacity: 0.7; }
    .tick.minor { height: 5px;  opacity: 0.3; }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 4px 4px 0 0;
    }
    .hand-hour   { width: 4px;  height: 40px; background: var(--text);   margin-left: -2px; }
    .hand-minute { width: 3px;  height: 56px; background: var(--accent);  margin-left: -1.5px; }
    .hand-second { width: 1.5px; height: 64px; background: var(--accent2); margin-left: -0.75px; }
    .center-dot {
      position: absolute;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 80%; max-width: 600px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 1.5rem auto;
      opacity: 0.4;
    }

    /* ── WORLD CLOCK ── */
    .section-title {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 1.2rem;
    }

    .world-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.8rem;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.2rem 2.5rem;
    }

    .city-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .city-card:hover {
      transform: translateY(-3px);
      border-color: rgba(245,158,11,0.4);
    }
    .city-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .city-card:hover::after { opacity: 1; }

    .card-city {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
    }
    .card-country {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0.15rem 0 0.6rem;
      color: var(--text);
    }
    .card-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .card-date {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
      letter-spacing: 0.1em;
    }
    .card-offset {
      position: absolute;
      top: 0.8rem;
      right: 0.9rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    /* day/night dot */
    .day-night {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .day   { background: #fde68a; box-shadow: 0 0 5px #fde68a; }
    .night { background: #3b82f6; box-shadow: 0 0 5px #3b82f6; }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.65rem;
      color: var(--border);
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<header>
  <div class="tag">⏱ Time everywhere</div>
  <h1>World <span>Clock</span></h1>
</header>

<!-- ── MAIN IST CLOCK ── -->
<div class="main-clock-wrap">
  <div class="city-label">🇮🇳 New Delhi · India Standard Time (IST · UTC+5:30)</div>
  <div class="main-time" id="mainTime">--:--:--</div>
  <div class="main-date" id="mainDate">Loading…</div>

  <div class="analog-wrap">
    <div class="clock-face" id="clockFace">
      <div class="hand hand-hour"   id="hourHand"></div>
      <div class="hand hand-minute" id="minuteHand"></div>
      <div class="hand hand-second" id="secondHand"></div>
      <div class="center-dot"></div>
    </div>
  </div>
</div>

<div class="divider"></div>
<p class="section-title">— World Clocks —</p>

<!-- ── WORLD CLOCK GRID ── -->
<div class="world-grid" id="worldGrid"></div>

<footer>auto-updating every second · times are live</footer>

<script>
  // ── timezone data ──
  const cities = [
    { city: "London",       country: "United Kingdom", tz: "Europe/London" },
    { city: "Paris",        country: "France",          tz: "Europe/Paris" },
    { city: "Dubai",        country: "UAE",             tz: "Asia/Dubai" },
    { city: "Karachi",      country: "Pakistan",        tz: "Asia/Karachi" },
    { city: "Dhaka",        country: "Bangladesh",      tz: "Asia/Dhaka" },
    { city: "Kathmandu",    country: "Nepal",           tz: "Asia/Kathmandu" },
    { city: "Colombo",      country: "Sri Lanka",       tz: "Asia/Colombo" },
    { city: "Bangkok",      country: "Thailand",        tz: "Asia/Bangkok" },
    { city: "Singapore",    country: "Singapore",       tz: "Asia/Singapore" },
    { city: "Tokyo",        country: "Japan",           tz: "Asia/Tokyo" },
    { city: "Sydney",       country: "Australia",       tz: "Australia/Sydney" },
    { city: "Moscow",       country: "Russia",          tz: "Europe/Moscow" },
    { city: "New York",     country: "USA (East)",      tz: "America/New_York" },
    { city: "Chicago",      country: "USA (Central)",   tz: "America/Chicago" },
    { city: "Los Angeles",  country: "USA (West)",      tz: "America/Los_Angeles" },
    { city: "Toronto",      country: "Canada",          tz: "America/Toronto" },
    { city: "São Paulo",    country: "Brazil",          tz: "America/Sao_Paulo" },
    { city: "Johannesburg", country: "South Africa",    tz: "Africa/Johannesburg" },
    { city: "Cairo",        country: "Egypt",           tz: "Africa/Cairo" },
    { city: "Nairobi",      country: "Kenya",           tz: "Africa/Nairobi" },
  ];

  // ── build world clock cards ──
  const grid = document.getElementById('worldGrid');
  cities.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'city-card';
    div.id = 'card-' + i;
    div.innerHTML = `
      <span class="card-offset" id="off-${i}"></span>
      <div class="card-city"><span class="day-night" id="dn-${i}"></span>${c.city}</div>
      <div class="card-country">${c.country}</div>
      <div class="card-time" id="ct-${i}">--:--:--</div>
      <div class="card-date" id="cd-${i}"></div>
    `;
    grid.appendChild(div);
  });

  // ── helpers ──
  const days  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function pad(n) { return String(n).padStart(2, '0'); }

  function getTimeIn(tz) {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false, day: 'numeric', month: 'short', weekday: 'short', year: 'numeric'
    }).formatToParts(now);
    const get = t => parts.find(p => p.type === t)?.value;
    let h = parseInt(get('hour'));
    const m = parseInt(get('minute'));
    const s = parseInt(get('second'));
    return { h, m, s,
      timeStr: `${pad(h)}:${pad(m)}:${pad(s)}`,
      dateStr: `${get('weekday')} · ${get('day')} ${get('month')} ${get('year')}`
    };
  }

  function isDay(h) { return h >= 6 && h < 20; }

  // ── update IST main clock ──
  function updateMain() {
    const { h, m, s, timeStr, dateStr } = getTimeIn('Asia/Kolkata');
    document.getElementById('mainTime').textContent = timeStr;
    document.getElementById('mainDate').textContent = dateStr;

    // analog hands
    const secDeg  = s * 6;
    const minDeg  = m * 6 + s * 0.1;
    const hourDeg = (h % 12) * 30 + m * 0.5;
    document.getElementById('secondHand').style.transform = `rotate(${secDeg}deg)`;
    document.getElementById('minuteHand').style.transform = `rotate(${minDeg}deg)`;
    document.getElementById('hourHand').style.transform   = `rotate(${hourDeg}deg)`;
  }

  // ── update world clocks ──
  function updateWorld() {
    cities.forEach((c, i) => {
      const { h, m, s, timeStr, dateStr } = getTimeIn(c.tz);
      document.getElementById(`ct-${i}`).textContent = timeStr;
      document.getElementById(`cd-${i}`).textContent = dateStr;

      // day/night indicator
      const dn = document.getElementById(`dn-${i}`);
      dn.className = 'day-night ' + (isDay(h) ? 'day' : 'night');
      dn.title = isDay(h) ? 'Daytime' : 'Nighttime';
    });
  }

  // ── draw tick marks once ──
  (function drawTicks() {
    const face = document.getElementById('clockFace');
    for (let i = 0; i < 60; i++) {
      const t = document.createElement('div');
      t.className = 'tick ' + (i % 5 === 0 ? 'major' : 'minor');
      const len = i % 5 === 0 ? 10 : 5;
      t.style.height = len + 'px';
      t.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
      const dist = 80 - len - 4;
      t.style.bottom = `calc(50% + ${dist}px)`;
      face.appendChild(t);
    }
  })();

  // ── kick off ──
  function tick() { updateMain(); updateWorld(); }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
